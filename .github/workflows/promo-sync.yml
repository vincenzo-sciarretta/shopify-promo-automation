name: Sincronizzazione Promo Automatica

on:
  schedule:
    - cron: '1 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-promo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: 🔍 DEBUG CRITICO
        run: |
          echo "=== QUALE FILE STO ESEGUENDO? ==="
          pwd
          ls -la *.js
          echo ""
          echo "=== CERCA 'metafieldsList' NEL FILE ==="
          grep -n "metafieldsList" promo-sync.js || echo "NON TROVATO ✅"
          echo ""
          echo "=== CERCA 'metafieldDelete' NEL FILE ==="
          grep -n "metafieldDelete" promo-sync.js || echo "NON TROVATO ❌"
          echo ""
          echo "=== RIGHE 180-200 ==="
          sed -n '180,200p' promo-sync.js
          echo ""
          echo "=== ULTIMO COMMIT ==="
          git log --oneline -5
          echo ""
          echo "=== BRANCH ATTUALE ==="
          git branch --show-current
          echo ""
          echo "=== TUTTI I FILE promo-sync.js ==="
          find . -name "promo-sync.js" -not -path "*/node_modules/*"
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Installa dipendenze
        run: npm install
      
      - name: Esegui sincronizzazione promo
        env:
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          FULL_SYNC: 'true'
        run: node promo-sync.js
