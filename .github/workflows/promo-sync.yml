name: Sincronizzazione Promo Automatica

on:
  # Polling leggero ogni 15 minuti
  schedule:
    - cron: '*/15 * * * *'   # Ogni 15 minuti
    - cron: '1 0 * * *'      # Full sync a mezzanotte (backup)
  
  # Trigger manuale
  workflow_dispatch:
  
  # Trigger via webhook esterno (per futuro Cloudflare)
  repository_dispatch:
    types: [promo_sync]

jobs:
  sync-promo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Installa dipendenze
        run: npm ci
      
      - name: Esegui sincronizzazione promo
        env:
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          FULL_SYNC: ${{ github.event.schedule == '1 0 * * *' && 'true' || 'false' }}
        run: node promo-sync.js
