name: Sincronizzazione Promo Automatica

on:
  schedule:
    - cron: '*/4 * * * *'  # Backup ogni 5 minuti
  workflow_dispatch:       # Esecuzione manuale
  repository_dispatch:     # ⭐ NUOVO: Chiamato da cron-job.org
    types: [sync-promo]

permissions:
  contents: read

jobs:
  sync-promo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: 🔍 DEBUG CRITICO
        run: |
          echo "=== QUALE FILE STO ESEGUENDO? ==="
          pwd
          ls -la *.js
          echo ""
          echo "=== CERCA 'metafieldsList' NEL FILE ==="
          grep -n "metafieldsList" promo-sync-v2.js || echo "NON TROVATO ✅"
          echo ""
          echo "=== CERCA 'metafieldDelete' NEL FILE ==="
          grep -n "metafieldDelete" promo-sync-v2.js || echo "NON TROVATO ❌"
          echo ""
          echo "=== RIGHE 180-200 ==="
          sed -n '180,200p' promo-sync-v2.js
          echo ""
          echo "=== ULTIMO COMMIT ==="
          git log --oneline -5
          echo ""
          echo "=== BRANCH ATTUALE ==="
          git branch --show-current
          echo ""
          echo "=== TUTTI I FILE promo-sync ==="
          find . -name "promo-sync*.js" -not -path "*/node_modules/*"
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Installa dipendenze
        run: npm install
      
      - name: Esegui sincronizzazione promo
        env:
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: node promo-sync-v2.js
