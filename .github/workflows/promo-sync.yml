name: Sincronizzazione Promo Automatica

on:
  schedule:
    - cron: '1 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-promo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Debug - Verifica codice
        run: |
          echo "=== CONTENUTO RIGA 189-203 ==="
          sed -n '189,203p' promo-sync.js
          echo ""
          echo "=== ULTIMO COMMIT ==="
          git log --oneline -1
          echo ""
          echo "=== HASH FILE ==="
          sha256sum promo-sync.js
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Installa dipendenze
        run: npm install
      
      - name: Esegui sincronizzazione promo
        env:
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          FULL_SYNC: 'true'
        run: node promo-sync.js
